name: Deploy Steps (reusable)

on:
  workflow_call:
    secrets:
      SNOWFLAKE_ACCOUNT:
        required: true
      SNOWFLAKE_USER:
        required: true
      SNOWFLAKE_PASSWORD:
        required: true
      DATAIKU_PUBLIC_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create schemachange history database
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python << 'EOF'
          import snowflake.connector
          import os
          import sys
          try:
              conn = snowflake.connector.connect(
                  account=os.environ['SNOWFLAKE_ACCOUNT'],
                  user=os.environ['SNOWFLAKE_USER'],
                  password=os.environ['SNOWFLAKE_PASSWORD'],
                  role='ACCOUNTADMIN'
              )
              cur = conn.cursor()
              cur.execute("CREATE WAREHOUSE IF NOT EXISTS TMDB_WH WAREHOUSE_SIZE = 'X-SMALL' AUTO_SUSPEND = 60 AUTO_RESUME = TRUE")
              cur.execute("CREATE DATABASE IF NOT EXISTS SCHEMACHANGE_DB")
              cur.execute("CREATE SCHEMA IF NOT EXISTS SCHEMACHANGE_DB.PUBLIC")
              conn.close()
              print("SCHEMACHANGE_DB and TMDB_WH initialized successfully")
          except Exception as e:
              print(f"ERROR: Failed to initialize SCHEMACHANGE_DB: {e}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Deploy to Snowflake
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          schemachange deploy \
            --snowflake-account ${{ secrets.SNOWFLAKE_ACCOUNT }} \
            --snowflake-user ${{ secrets.SNOWFLAKE_USER }} \
            --snowflake-role ACCOUNTADMIN \
            --snowflake-warehouse TMDB_WH \
            --snowflake-database SCHEMACHANGE_DB \
            --root-folder migrations \
            --create-change-history-table \
            --change-history-table SCHEMACHANGE_DB.PUBLIC.TMDB_HISTORY

      - name: Set Dataiku user RSA public key
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATAIKU_PUBLIC_KEY: ${{ secrets.DATAIKU_PUBLIC_KEY }}
        run: |
          python << 'EOF'
          import snowflake.connector
          import os
          import sys
          try:
              public_key = os.environ['DATAIKU_PUBLIC_KEY']
              public_key = ''.join(l for l in public_key.splitlines() if l and not l.startswith('-----'))
              conn = snowflake.connector.connect(
                  account=os.environ['SNOWFLAKE_ACCOUNT'],
                  user=os.environ['SNOWFLAKE_USER'],
                  password=os.environ['SNOWFLAKE_PASSWORD'],
                  role='ACCOUNTADMIN'
              )
              conn.cursor().execute(f"ALTER USER DATAIKU_USER SET RSA_PUBLIC_KEY = '{public_key}'")
              conn.close()
              print("RSA public key set successfully for DATAIKU_USER")
          except Exception as e:
              print(f"ERROR: Failed to set RSA public key: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
